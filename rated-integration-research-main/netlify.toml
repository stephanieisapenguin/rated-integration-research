[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every route serves index.html so React Router (or hash-based
# routing) handles deep links instead of Netlify returning a 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set these in the Netlify dashboard under Site settings → Environment variables:
#   VITE_API_BASE_URL  = https://<your-backend-host>   (Render/Railway/Fly URL)
#   VITE_TMDB_API_KEY  = <your TMDB v3 key>
